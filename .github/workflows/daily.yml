# ──────────────────────────────────────────────────────────────────────────────
# .github/workflows/daily.yml
#
# Automated Bot — Daily Digest Workflow
# Sends ONE combined email every morning at 7:00 AM IST.
# Email contains: weather report + top headlines from 3 news sources.
#
# Schedule: 30 1 * * *  →  1:30 AM UTC  =  7:00 AM IST  (every day)
# ──────────────────────────────────────────────────────────────────────────────

name: "🤖 Daily Digest — Weather + News Email"

on:

  # ── Scheduled trigger: every day at 7:00 AM IST (1:30 AM UTC) ──────────────
  schedule:
    - cron: "30 1 * * *"
    # ┌───── minute (30)
    # │  ┌── hour in UTC (1 = 1 AM UTC = 6:30 AM IST... + 30 min = 7:00 AM IST)
    # │  │  ┌─ day of month (* = every day)
    # │  │  │  ┌ month (* = every month)
    # │  │  │  │  ┌ day of week (* = every day)
    # 30 1  *  *  *

  # ── Manual trigger: run it any time from GitHub → Actions tab ───────────────
  workflow_dispatch:
    # No inputs needed — just click "Run workflow"

# ── Job definition ─────────────────────────────────────────────────────────────
jobs:

  send-daily-digest:
    name: "Send Daily Weather + News Email"
    runs-on: ubuntu-latest   # Fresh Linux environment provided by GitHub

    steps:

      # ── 1. Get the code ───────────────────────────────────────────────────
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        # This downloads your repo files (bot.py, requirements.txt, etc.)
        # into the workflow runner so Python can execute them.

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: "🐍 Set up Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # cache: pip tells GitHub to cache downloaded packages.
          # Subsequent runs are faster because packages don't re-download.
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: "📦 Install Python dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run the bot ─────────────────────────────────────────────────────
      - name: "🚀 Run Automated Bot"
        env:
          # Secrets are injected here as environment variables.
          # NEVER put actual values here — always use ${{ secrets.NAME }}.
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          APP_PASSWORD:        ${{ secrets.APP_PASSWORD }}

          # These are not sensitive, so they can be hardcoded here.
          # If you want them as secrets too, just change to ${{ secrets.NAME }}
          SENDER_EMAIL:        "rahulpradeep2050@gmail.com"
          RECEIVER_EMAIL:      "suma.hempel2007@gmail.com"

        run: |
          echo "🤖 Starting Automated Bot..."
          python bot.py
          echo "✅ Bot run complete."

      # ── 5. Report failure ─────────────────────────────────────────────────
      # This step only runs if the bot script raised an error (exit code != 0)
      - name: "❌ Notify on failure"
        if: failure()
        run: |
          echo "::error::Automated Bot failed. Check logs above for details."
          echo "Common causes:"
          echo "  1. OPENWEATHER_API_KEY secret not set or expired"
          echo "  2. APP_PASSWORD secret not set or revoked"
          echo "  3. RSS feed URL changed or site is down"
